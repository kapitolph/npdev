# nextpay-dev-vps tmux configuration
# Loaded by session.sh via: tmux -f ~/.vps/tmux.conf

# ─── Core Settings ────────────────────────────────────────────────────────────

# Source user's personal config if it exists
source-file -q ~/.tmux.conf

# Keep default Ctrl-B prefix (team familiarity)
set -g prefix C-b

# Extended keys (Shift+Enter, etc. pass through correctly)
set -g extended-keys always
# extended-keys-format requires tmux 3.5+
if-shell 'tmux -V | awk "{if ($2 >= 3.5) exit 0; else exit 1}"' \
  'set -gs extended-keys-format csi-u'

# 256-color + true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Large scrollback
set -g history-limit 50000

# Faster key repetition
set -sg escape-time 10

# Enable mouse (scroll, pane select, resize)
set -g mouse on

# Detach when session is destroyed (don't switch to another session)
set -g detach-on-destroy on

# ─── Navigation ───────────────────────────────────────────────────────────────

# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Session navigation — go back to previous session after npdev switch
bind Escape if-shell '[ "$(tmux list-sessions 2>/dev/null | wc -l)" -gt 1 ]' \
  'switch-client -l' \
  'display-message "No other sessions"'

# Click session name or right-click status bar for action menu
bind -n MouseDown1StatusLeft display-menu -T "#[align=centre]Session: #S" \
  "Back to previous" b "switch-client -l" \
  "Detach" d "detach-client" \
  "" \
  "Choose session" s "choose-tree -Zs"

bind -n MouseDown3Status display-menu -T "#[align=centre]Session: #S" \
  "Back to previous" b "switch-client -l" \
  "Detach" d "detach-client" \
  "" \
  "Choose session" s "choose-tree -Zs"

# ─── Status Bar ───────────────────────────────────────────────────────────────

# Minimal status bar — session name visible for multi-user awareness
set -g status on
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour244"
set -g status-left " #[fg=colour82,bold]#S #[fg=colour244]│ "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[fg=colour82 bold] ^B #[fg=colour244]Esc:back #[fg=colour237]|#[fg=colour244] d:detach #[fg=colour237]|#[fg=colour244] s:sessions ,#[fg=colour240]^B for actions  }#[fg=colour244]%H:%M "
set -g status-right-length 60
set -g window-status-current-style "fg=colour82,bold"
set -g window-status-style "fg=colour244"

# ─── Attach/Detach Notifications ─────────────────────────────────────────────

set-hook -g client-attached 'run-shell "bash ~/.vps/hooks/notify-attach.sh attached #{client_pid} #{session_name}"'
set-hook -g client-detached 'run-shell "bash ~/.vps/hooks/notify-attach.sh detached #{client_pid} #{session_name}"'

# ─── Persistence (TPM + Resurrect + Continuum) ───────────────────────────────

# tmux-resurrect: save/restore sessions across tmux server restarts
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# tmux-continuum: auto-save every 1 minute, auto-restore on tmux start
set -g @continuum-save-interval '1'
set -g @continuum-restore 'on'

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM (keep at very bottom, skip if not installed)
if-shell 'test -f ~/.tmux/plugins/tpm/tpm' \
  'run-shell ~/.tmux/plugins/tpm/tpm'
